repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.3
    hooks:
      - id: ruff          # lint
        args: [--fix]
      - id: ruff-format   # format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies: [types-requests, pydantic, fastapi]
        args: [--ignore-missing-imports]
        exclude: ^tests/

  - repo: https://github.com/jsh9/pydoclint
    rev: 0.8.3
    hooks:
      - id: pydoclint
        additional_dependencies: []
        args: [domain/, adapters/, app/, api.py, cli.py]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest --override-ini=addopts=
        language: system
        pass_filenames: false
        always_run: true
